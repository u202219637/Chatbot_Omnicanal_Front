<app-navbar></app-navbar>

<div class="page">
  <div class="page-body">
    <div class="section-title">Base RAG</div>
    <div class="section-sub">Documentos cargados para el asistente IA</div>

    <div class="loading-spinner" *ngIf="loading">⏳ Cargando documentos...</div>

    <div class="empty-state" *ngIf="!loading && documentos.length === 0">
      <div class="empty-icon">📂</div>
      No hay documentos cargados.
    </div>

    <div *ngIf="!loading && documentos.length > 0"
         style="background:var(--white);border:1px solid var(--line);border-radius:18px;overflow:hidden">
      <table class="sb-table" style="width:100%">
        <thead>
          <tr>
            <th>Título</th><th>Estado</th><th>Fecha de carga</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let d of documentos">
            <td style="font-weight:700">{{ d.titulo }}</td>
            <td><span class="badge badge-green">{{ d.estado }}</span></td>
            <td style="color:var(--muted)">{{ d.fechaCarga }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
