<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(160deg,#f8fafc,#f0f4ff);padding:40px 20px">
  <div style="width:100%;max-width:520px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="sb-logo" style="width:44px;height:44px;font-size:22px">S</div>
        <span style="font-size:22px;font-weight:900;color:var(--p)">ShadowByte</span>
      </div>
      <h2 style="font-size:28px;font-weight:900;letter-spacing:-.04em;margin-bottom:6px">Crear cuenta</h2>
      <p style="color:var(--muted);font-size:15px">Accede a todo el catálogo y a Shadow IA</p>
    </div>

    <div class="sb-card" style="box-shadow:var(--shadow-lg)">
      <div *ngIf="error"   class="badge badge-red"   style="display:block;padding:12px;font-size:14px;margin-bottom:18px;border-radius:10px">⚠️ {{ error }}</div>
      <div *ngIf="success" class="badge badge-green" style="display:block;padding:12px;font-size:14px;margin-bottom:18px;border-radius:10px">✓ {{ success }}</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div><label class="sb-label">Nombres</label>
          <input class="sb-input" [(ngModel)]="form.nombres" placeholder="Juan"></div>
        <div><label class="sb-label">Apellidos</label>
          <input class="sb-input" [(ngModel)]="form.apellidos" placeholder="Pérez"></div>
      </div>

      <div style="margin-bottom:14px">
        <label class="sb-label">Correo electrónico</label>
        <input class="sb-input" [(ngModel)]="form.correo" type="email" placeholder="juan@email.com">
      </div>

      <div style="margin-bottom:14px">
        <label class="sb-label">Teléfono</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="background:#f1f5f9;border:1.5px solid var(--line);border-radius:10px;
                      padding:0 12px;height:44px;display:flex;align-items:center;
                      font-weight:700;color:var(--ink);white-space:nowrap;font-size:14px">
            🇵🇪 +51
          </span>
          <input class="sb-input" [(ngModel)]="form.telefono"
                placeholder="982342259" maxlength="9"
                style="flex:1"
                (input)="soloNumeros($event)">
        </div>
        <span style="font-size:12px;color:var(--muted);margin-top:4px;display:block">
          Solo los 9 dígitos, sin el +51
        </span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
        <div><label class="sb-label">Username</label>
          <input class="sb-input" [(ngModel)]="form.username" placeholder="juanperez"></div>
        <div><label class="sb-label">Contraseña</label>
          <input class="sb-input" [(ngModel)]="form.password" type="password" placeholder="Mínimo 8 caracteres"></div>
      </div>

      <button class="btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:14px"
              (click)="registrar()" [disabled]="loading">
        {{ loading ? '⏳ Creando cuenta...' : 'Crear cuenta gratis →' }}
      </button>
    </div>

    <div style="text-align:center;margin-top:18px;font-size:14px;color:var(--muted)">
      ¿Ya tienes cuenta?
      <a routerLink="/login" style="color:var(--p);font-weight:800"> Inicia sesión</a>
    </div>
  </div>
</div>
