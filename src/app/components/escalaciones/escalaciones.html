<app-navbar></app-navbar>

<div class="page">
  <div class="page-body">
    <div class="section-title">Escalaciones</div>
    <div class="section-sub">Conversaciones que requieren atención de un asesor</div>

    <div class="loading-spinner" *ngIf="loading">⏳ Cargando escalaciones...</div>

    <div class="empty-state" *ngIf="!loading && escalaciones.length === 0">
      <div class="empty-icon">🎧</div>
      No hay escalaciones registradas.
    </div>

    <div *ngIf="!loading && escalaciones.length > 0"
         style="background:var(--white);border:1px solid var(--line);border-radius:18px;overflow:hidden">
      <table class="sb-table" style="width:100%">
        <thead>
          <tr>
            <th>Cliente</th><th>Estado</th><th>Motivo</th><th>Fecha</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of escalaciones">
            <td style="font-weight:700">{{ e.clienteNombre }}</td>
            <td>
              <span [class]="e.estado === 'PENDIENTE' ? 'badge badge-orange' :
                             e.estado === 'RESUELTA'  ? 'badge badge-green'  : 'badge badge-blue'">
                {{ e.estado }}
              </span>
            </td>
            <td style="color:var(--muted)">{{ e.motivo }}</td>
            <td style="color:var(--muted)">{{ e.fechaCreacion }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
