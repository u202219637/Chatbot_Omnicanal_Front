<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:var(--soft);padding:20px">
  <div class="sb-card" style="max-width:420px;width:100%;text-align:center;
              box-shadow:var(--shadow-lg);padding:40px 32px">

    <div style="font-size:40px;margin-bottom:14px">🔐</div>
    <h2 style="font-size:24px;font-weight:900;margin-bottom:8px">Nueva contraseña</h2>

    <!-- Token inválido (sin parámetro) -->
    <div *ngIf="!tokenValido">
      <p style="color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:20px">
        {{ error }}
      </p>
      <a routerLink="/login" class="btn-primary"
         style="display:inline-block;text-decoration:none;padding:12px 28px">
        Ir al login
      </a>
    </div>

    <!-- Formulario -->
    <div *ngIf="tokenValido && !exito">
      <p style="color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:24px">
        Crea una nueva contraseña para tu cuenta de ShadowByte.
      </p>

      <div *ngIf="error" style="background:var(--red2);color:#991b1b;padding:12px 16px;
           border-radius:10px;font-size:14px;font-weight:600;margin-bottom:20px;text-align:left">
        ⚠️ {{ error }}
      </div>

      <div style="margin-bottom:16px;text-align:left">
        <label class="sb-label">Nueva contraseña</label>
        <input class="sb-input" type="password" [(ngModel)]="password"
               placeholder="Mínimo 6 caracteres" (keydown.enter)="resetear()">
      </div>

      <div style="margin-bottom:24px;text-align:left">
        <label class="sb-label">Confirmar contraseña</label>
        <input class="sb-input" type="password" [(ngModel)]="confirmarPassword"
               placeholder="Repite la contraseña" (keydown.enter)="resetear()">
      </div>

      <button class="btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:14px"
              (click)="resetear()" [disabled]="loading">
        {{ loading ? '⏳ Actualizando...' : 'Actualizar contraseña' }}
      </button>
    </div>

    <!-- Éxito -->
    <div *ngIf="exito">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <p style="color:var(--ink);font-size:15px;line-height:1.7;margin-bottom:8px;font-weight:700">
        Contraseña actualizada correctamente
      </p>
      <p style="color:var(--muted);font-size:13px">
        Redirigiendo al login...
      </p>
    </div>

  </div>
</div>
